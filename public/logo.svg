<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- SYSmoAI Horizontal Lockup — Brand Dark variant -->
  <!-- Icon mark: three concentric hexagonal layers -->
  <svg x="0" y="0" width="64" height="64" viewBox="0 0 100 100">
    <!-- Layer 1: Infrastructure (outer) -->
    <path d="M25 34 L50 24 L75 34 L75 54 L50 64 L25 54 Z"
          fill="#1E3A8A" fill-opacity="0.3"
          stroke="#2563EB" stroke-opacity="0.6"
          stroke-width="2" stroke-linejoin="round"/>
    <!-- Layer 2: Orchestration (mid) -->
    <path d="M30 49 L50 40 L70 49 L70 64 L50 73 L30 64 Z"
          fill="#2563EB" fill-opacity="0.5"
          stroke="#3B82F6" stroke-opacity="0.8"
          stroke-width="2" stroke-linejoin="round"/>
    <!-- Layer 3: Intelligence (core) -->
    <path d="M40 61 L50 56 L60 61 L60 71 L50 76 L40 71 Z"
          fill="#3B82F6" fill-opacity="1"
          stroke="#60A5FA" stroke-opacity="1"
          stroke-width="2" stroke-linejoin="round"/>
  </svg>
  <!-- Wordmark: SYSmoAI with optical kerning -->
  <text y="32" dominant-baseline="middle"
        font-family="Inter, 'SF Pro Display', -apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="28"
        font-feature-settings='"kern" 1, "liga" 1, "calt" 1'>
    <tspan x="76" font-weight="700" letter-spacing="-0.56" fill="#030213">SYS</tspan><tspan font-weight="400" letter-spacing="-1.12" fill="#030213" opacity="0.65">mo</tspan><tspan font-weight="700" letter-spacing="0.56" fill="#030213">AI</tspan>
  </text>
</svg>
